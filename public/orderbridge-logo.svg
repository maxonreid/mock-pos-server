<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f35"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Left node -->
  <circle cx="6" cy="16" r="3" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Center node (larger, bright green — the bridge) -->
  <circle cx="16" cy="16" r="4" fill="#00ff88" filter="url(#glow)"/>
  <!-- Inner dot -->
  <circle cx="16" cy="16" r="1.5" fill="#0A0F1E"/>

  <!-- Right node -->
  <circle cx="26" cy="16" r="3" fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Connecting lines -->
  <line x1="9" y1="16" x2="12" y2="16" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="16" x2="23" y2="16" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Subtle tick marks on lines (data flow) -->
  <line x1="10.5" y1="14.5" x2="10.5" y2="17.5" stroke="#00e5ff" stroke-width="0.8" opacity="0.35"/>
  <line x1="21.5" y1="14.5" x2="21.5" y2="17.5" stroke="#00e5ff" stroke-width="0.8" opacity="0.35"/>
</svg>
